      {id:'q16',chapter_id:'ch3',type:'essay',question:'\u673a\u52a8\u8f66\u6392\u653e\u68c0\u9a8c\u7684\u6cd5\u5b9a\u6d41\u7a0b\u987a\u5e8f\u662f\u4ec0\u4e48\uff1f\u7701\u7ea7\u751f\u6001\u73af\u5883\u4e3b\u7ba1\u90e8\u95e8\u6709\u7279\u6b8a\u8981\u6c42\u65f6\uff0c\u8fd8\u9700\u589e\u52a0\u4ec0\u4e48\u68c0\u6d4b\u9879\u76ee\uff1f',options:[],answer:'1) \u6cd5\u5b9a\u6d41\u7a0b\u987a\u5e8f\uff1a\u8054\u7f51\u6838\u67e5\u2192\u5916\u89c2\u68c0\u9a8c\u2192OBD\u68c0\u67e5\u2192\u6392\u6c14\u6c61\u67d3\u7269\u68c0\u6d4b\uff0c\u9700\u6309\u6b64\u987a\u5e8f\u5f00\u5c55\uff0c\u4e0d\u5f97\u98a0\u5012\uff1b\n2) \u9644\u52a0\u9879\u76ee\uff1a\u7701\u7ea7\u751f\u6001\u73af\u5883\u4e3b\u7ba1\u90e8\u95e8\u786e\u5b9a\u5f00\u5c55\u6c7d\u6cb9\u8f66\u71c3\u6cb9\u84b8\u53d1\u68c0\u6d4b\u7684\uff0c\u8fd8\u5e94\u589e\u52a0\u71c3\u6cb9\u84b8\u53d1\u6392\u653e\u63a7\u5236\u7cfb\u7edf\u68c0\u6d4b\u3002',explanation:'\u6807\u51c6\u4f9d\u636e\uff1a\u6807\u51c67.1\u3002'},

      {id:'q18',chapter_id:'ch3',type:'essay',question:'\u5de5\u51b5\u6cd5\u68c0\u6d4b\u65e0\u6cd5\u5b9e\u65bd\u65f6\uff0c\u68c0\u9a8c\u673a\u6784\u7684\u5ba1\u6279\u53ca\u68c0\u6d4b\u8981\u6c42\u6709\u54ea\u4e9b\uff1f',options:[],answer:'1) \u68c0\u9a8c\u673a\u6784\u5e94\u5236\u5b9a\u5185\u90e8\u5ba1\u6279\u7a0b\u5e8f\uff0c\u5bf9\u65e0\u6cd5\u91c7\u7528\u5de5\u51b5\u6cd5\u7684\u8f66\u8f86\uff0c\u8be6\u7ec6\u3001\u5982\u5b9e\u8bb0\u5f55\u5177\u4f53\u539f\u56e0\uff1b\n2) \u539f\u56e0\u8bb0\u5f55\u9700\u7ecf\u68c0\u9a8c\u673a\u6784\u6280\u672f\u8d1f\u8d23\u4eba\u6216\u6388\u6743\u7b7e\u5b57\u4eba\u5ba1\u6838\u6279\u51c6\uff1b\n3) \u5ba1\u6279\u540e\uff0c\u6c7d\u6cb9\u8f66/\u71c3\u6c14\u8f66\u6539\u7528\u53cc\u6020\u901f\u6cd5\u68c0\u6d4b\uff0c\u67f4\u6cb9\u8f66\u6539\u7528\u81ea\u7531\u52a0\u901f\u6cd5\u68c0\u6d4b\uff1b\n4) \u5ba1\u6279\u8bb0\u5f55\u5e94\u968f\u68c0\u9a8c\u62a5\u544a\u4e00\u540c\u5b58\u6863\uff0c\u751f\u6001\u73af\u5883\u4e3b\u7ba1\u90e8\u95e8\u53ef\u5bf9\u5ba1\u6279\u8bb0\u5f55\u8fdb\u884c\u76d1\u7763\u62bd\u67e5\uff1b\n5) \u540c\u4e00\u8f66\u8f86\u6216\u76f8\u540c\u578b\u53f7\u8f66\u8f86\u5e94\u91c7\u7528\u540c\u4e00\u79cd\u68c0\u6d4b\u65b9\u6cd5\uff0c\u4e0d\u5f97\u968f\u610f\u53d8\u66f4\u3002',explanation:'\u6807\u51c6\u4f9d\u636e\uff1a\u6807\u51c67.3\u3001\u9644\u5f55D.3.1\u3002'},
      {id:'q19',chapter_id:'ch4',type:'essay',question:'\u67d0\u68c0\u9a8c\u673a\u6784\u5bf9\u4e00\u8f862019\u5e74\u751f\u4ea7\u7684\u91cd\u578b\u67f4\u6cb9\u8f66\u8fdb\u884c\u6392\u653e\u5b9a\u671f\u68c0\u9a8c\uff0c\u8fc7\u7a0b\u4e2d\u51fa\u73b0\u4ee5\u4e0b\u60c5\u51b5\uff1a\n\u2460 \u5916\u89c2\u68c0\u9a8c\u65f6\u53d1\u73b0\u8f66\u8f86\u6c61\u67d3\u7269\u63a7\u5236\u88c5\u7f6e\u9f50\u5168\uff0c\u4f46DPF\u578b\u53f7\u65e0\u6cd5\u76ee\u89c6\u8bc6\u522b\uff1b\n\u2461 OBD\u8bca\u65ad\u4eea\u8fde\u63a5\u540e\u4e24\u6b21\u901a\u4fe1\u5747\u672a\u6210\u529f\uff0c\u67e5\u8be2\u8bb0\u5f55\u53d1\u73b0\u8be5\u8f66\u578b5\u53f0\u8f66\u8f86OBD\u901a\u4fe1\u5747\u4e0d\u5408\u683c\uff1b\n\u2462 \u6392\u6c14\u6c61\u67d3\u7269\u68c0\u6d4b\u65f6\uff0c\u56e0\u8f66\u8f86\u65e0\u6cd5\u624b\u52a8\u5173\u95ed\u7275\u5f15\u529b\u63a7\u5236\u7cfb\u7edf\uff0c\u65e0\u6cd5\u91c7\u7528\u52a0\u8f7d\u51cf\u901f\u6cd5\u3002\n\n\u8bf7\u7ed3\u5408HJ 1237\u20142021\u6807\u51c6\uff0c\u9010\u4e00\u5206\u6790\u4e0a\u8ff0\u60c5\u51b5\u7684\u5408\u89c4\u5224\u5b9a\u53ca\u540e\u7eed\u5904\u7406\u8981\u6c42\u3002',options:[],answer:'\u60c5\u51b5\u2460\uff1aDPF\u578b\u53f7\u65e0\u6cd5\u76ee\u89c6\u8bc6\u522b\n\u5408\u89c4\u5224\u5b9a\uff1a\u8be5\u9879\u76ee\u5916\u89c2\u68c0\u9a8c\u5408\u683c\u3002\n\u5904\u7406\u8981\u6c42\uff1a\n1) \u5bf9\u6c61\u67d3\u7269\u63a7\u5236\u88c5\u7f6e\u62cd\u7167/\u5f55\u5236\u89c6\u9891\u8bb0\u5f55\uff0c\u4fdd\u8bc1\u7167\u7247/\u89c6\u9891\u4e2d\u88c5\u7f6e\u57fa\u7840\u4fe1\u606f\u6e05\u6670\u53ef\u89c1\uff1b\n2) \u5728\u5916\u89c2\u68c0\u9a8c\u8bb0\u5f55\u8868\u7684DPF\u578b\u53f7\u680f\u76ee\u586b\u5199\u201c\u4fe1\u606f\u4e0d\u53ef\u89c1\u201d\uff1b\n3) \u65e0\u9700\u8981\u6c42\u8f66\u4e3b\u6574\u6539\uff0c\u6309\u6807\u51c6\u89c4\u5b9a\u4fe1\u606f\u4e0d\u53ef\u89c1\u89c6\u4e3a\u6c61\u67d3\u7269\u63a7\u5236\u88c5\u7f6e\u68c0\u67e5\u5408\u683c\u3002\n\u6807\u51c6\u4f9d\u636e\uff1a\u6807\u51c6\u9644\u5f55BA.1\u8868BA.1\u6ce83\u3002\n\n\u60c5\u51b5\u2461\uff1a\u8be5\u8f66\
